<form [formGroup]="deviceForm" (ngSubmit)="onSubmit()" class="form-section">
    <div class="form-group">
        <label for="deviceName">Device Name</label>
        <input id="deviceName" pInputText type="text" formControlName="deviceName" placeholder="Enter device name"
            class="w-full" />
        <small class="error" *ngIf="deviceForm.get('deviceName')?.invalid && deviceForm.get('deviceName')?.touched">
            Device name is required and must be at least 3 characters
        </small>
    </div>

    <div class="form-group">
        <label for="deviceId">Device ID</label>
        <input id="deviceId" pInputText type="text" formControlName="deviceId" placeholder="e.g., DV-001"
            class="w-full" />
        <small class="error" *ngIf="deviceForm.get('deviceId')?.invalid && deviceForm.get('deviceId')?.touched">
            Device ID is required
        </small>
    </div>

    <div class="form-group">
        <label for="deviceType">Device Type</label>
        <p-dropdown id="deviceType" formControlName="deviceType" [options]="deviceTypes" optionLabel="label"
            optionValue="value" placeholder="Select device type" class="w-full"></p-dropdown>
        <small class="error" *ngIf="deviceForm.get('deviceType')?.invalid && deviceForm.get('deviceType')?.touched">
            Device type is required
        </small>
    </div>

    <div class="form-group">
        <label for="location">Location</label>
        <input id="location" pInputText type="text" formControlName="location" placeholder="e.g., Plant A · Sector 3"
            class="w-full" />
        <small class="error" *ngIf="deviceForm.get('location')?.invalid && deviceForm.get('location')?.touched">
            Location is required
        </small>
    </div>

    <div class="form-group">
        <label for="battery">Battery Level (%)</label>
        <p-inputNumber id="battery" formControlName="battery" [min]="0" [max]="100" placeholder="0-100"
            class="w-full"></p-inputNumber>
        <small class="error" *ngIf="deviceForm.get('battery')?.invalid && deviceForm.get('battery')?.touched">
            Battery must be between 0 and 100
        </small>
    </div>

    <div class="form-actions">
        <button type="button" pButton label="Cancel" icon="pi pi-times" class="p-button-secondary"
            (click)="resetForm()"></button>
        <button type="submit" class="btn primary" pButton label="Add Device" icon="pi pi-check" [disabled]="!deviceForm.valid"></button>
    </div>
</form>
