<main class="content">
  <div class="page-header">
    <div>
      <h1>Devices</h1>
      <p>Manage and monitor your full fleet of connected devices.</p>
    </div>

  </div>
  <div class="hstack justify-between flex-wrap gap-3">
    <div class="tabs">
      <button [ngClass]="{ 'active': selectedTab === 0 }" (click)="selectedTab = 0">All <span class="muted">150</span></button>
      <button [ngClass]="{ 'active': selectedTab === 1 }" (click)="selectedTab = 1">Online <span class="muted">142</span></button>
      <button [ngClass]="{ 'active': selectedTab === 2 }" (click)="selectedTab = 2">Warning <span class="muted">5</span></button>
      <button [ngClass]="{ 'active': selectedTab === 3 }" (click)="selectedTab = 3">Offline <span class="muted">3</span></button>
    </div>
    <div class="hstack">
      <div class="search"><i class="pi pi-search"></i><input placeholder="Search by ID or name…"></div>
      <button class="btn primary" (click)="openAddDeviceDialog()"><i class="pi pi-plus"></i><span>Add
          device</span></button>
    </div>
  </div>
  <div class="card p-0">
    <table class="table">
      <thead>
        <tr>
          <th>Device</th>
          <th>Status</th>
          <th>Type</th>
          <th>Location</th>
          <th>Battery</th>
          <th>Last seen</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let device of devices">
          <td>
            <a routerLink="/site-dashboard" [queryParams]="{id: device.id}">
              <div class="font-medium text-blue-600">{{ device.name }}</div>
              <div class="muted mono text-xs">{{ device.id }}</div>
            </a>
          </td>
          <td><span [ngClass]="'badge ' + device.status">● {{ device.status | titlecase }}</span></td>
          <td>{{ device.type }}</td>
          <td>{{ device.location }}</td>
          <td class="mono">{{ device.battery }}</td>
          <td class="muted">{{ device.lastSeen }}</td>
          <td>
            <div class="flex gap-2">
              <button (click)="navigateToDeviceDashboard(device.id)" title="Device Dashboard" class="text-blue-500 hover:text-white hover:bg-blue-600 transition-colors p-2 rounded">
                <i class="pi pi-chart-bar text-base"></i>
              </button>
              <button (click)="navigateToDeviceDetail(device.id)" title="Device Details" class="text-blue-500 hover:text-white hover:bg-blue-600 transition-colors p-2 rounded">
                <i class="pi pi-tablet text-base"></i>
              </button>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</main>

<!-- Add Device Dialog -->
<app-modal-dialog [(visible)]="displayAddDeviceDialog" header="Add New Device">
  <app-add-device (deviceAdded)="onDeviceAdded($event)"></app-add-device>
</app-modal-dialog>
