<form [formGroup]="locationForm" class="form-section">
    <div class="form-group">
        <label for="name">{{ levelNames[level] }} Name</label>
        <input id="name" pInputText type="text" formControlName="name" 
            placeholder="Enter location name"
            class="w-full" />
        <small class="error" *ngIf="locationForm.get('name')?.invalid && locationForm.get('name')?.touched">
            Name is required and must be at least 3 characters
        </small>
    </div>

    <div class="form-group">
        <label for="code">Code</label>
        <input id="code" pInputText type="text" formControlName="code" 
            placeholder="Enter location code"
            class="w-full" />
        <small class="error" *ngIf="locationForm.get('code')?.invalid && locationForm.get('code')?.touched">
            Code is required and must be at least 2 characters
        </small>
    </div>
</form>

<div class="form-actions pt-2" dialogFooter>
    <button type="button" pButton label="Cancel" icon="pi pi-times" class="p-button-secondary"
        (click)="resetForm()"></button>
    <button type="submit" pButton 
        [label]="isEditMode ? 'Update ' : 'Add ' + levelNames[level]" 
        icon="pi pi-check" [disabled]="!locationForm.valid"
        (click)="onSubmit()"></button>
</div>
