<form [formGroup]="locationForm" class="form-section">
    <div class="form-group">
        <label for="name">Location Name</label>
        <input id="name" pInputText type="text" formControlName="name" placeholder="Enter location name"
            class="w-full" />
        <small class="error" *ngIf="locationForm.get('name')?.invalid && locationForm.get('name')?.touched">
            Name is required and must be at least 3 characters
        </small>
    </div>

    <div class="form-group">
        <label for="description">Description</label>
        <input id="description" pInputText type="text" formControlName="description" placeholder="Enter description"
            class="w-full" />
        <small class="error" *ngIf="locationForm.get('description')?.invalid && locationForm.get('description')?.touched">
            Description is required
        </small>
    </div>

    <div class="form-group">
        <label for="region">Region</label>
        <p-select id="region" [options]="regions" optionLabel="label" optionValue="value" 
            formControlName="region" placeholder="Select a region" class="w-full"></p-select>
        <small class="error" *ngIf="locationForm.get('region')?.invalid && locationForm.get('region')?.touched">
            Region is required
        </small>
    </div>

    <div class="form-group">
        <label for="city">City</label>
        <p-select id="city" [options]="cities" optionLabel="label" optionValue="value" 
            formControlName="city" placeholder="Select a city" class="w-full"></p-select>
        <small class="error" *ngIf="locationForm.get('city')?.invalid && locationForm.get('city')?.touched">
            City is required
        </small>
    </div>

    <div class="form-group">
        <label for="address">Address</label>
        <input id="address" pInputText type="text" formControlName="address" placeholder="Enter address"
            class="w-full" />
        <small class="error" *ngIf="locationForm.get('address')?.invalid && locationForm.get('address')?.touched">
            Address is required
        </small>
    </div>

    <div class="form-group">
        <label for="coordinates">Coordinates</label>
        <input id="coordinates" pInputText type="text" formControlName="coordinates" placeholder="e.g., 40.7128, -74.0060"
            class="w-full" />
    </div>
</form>

<div class="form-actions" dialogFooter>
    <button type="button" pButton label="Cancel" icon="pi pi-times" class="p-button-secondary"
        (click)="resetForm()"></button>
    <button type="submit" pButton label="Add Location" icon="pi pi-check" [disabled]="!locationForm.valid"
        (click)="onSubmit()"></button>
</div>
