<form [formGroup]="locationForm" class="form-section">
    <div class="form-group">
        <label for="name">Location Name</label>
        <input id="name" pInputText type="text" formControlName="name" placeholder="Enter location name"
            class="w-full" />
        <small class="error" *ngIf="locationForm.get('name')?.invalid && locationForm.get('name')?.touched">
            Location name is required and must be at least 3 characters
        </small>
    </div>

    <div class="form-group">
        <label for="region">Region</label>
        <p-select id="region" [options]="regions" optionLabel="label" optionValue="value" 
            formControlName="region" placeholder="Select a region" class="w-full"></p-select>
        <small class="error" *ngIf="locationForm.get('region')?.invalid && locationForm.get('region')?.touched">
            Region is required
        </small>
    </div>

    <div class="form-group">
        <label for="subRegion">Sub Region</label>
        <p-select id="subRegion" [options]="subRegions" optionLabel="label" optionValue="value" 
            formControlName="subRegion" placeholder="Select a sub region" class="w-full"></p-select>
        <small class="error" *ngIf="locationForm.get('subRegion')?.invalid && locationForm.get('subRegion')?.touched">
            Sub region is required
        </small>
    </div>

    <div class="form-group">
        <label for="address">Address</label>
        <input id="address" pInputText type="text" formControlName="address" placeholder="Enter address"
            class="w-full" />
        <small class="error" *ngIf="locationForm.get('address')?.invalid && locationForm.get('address')?.touched">
            Address is required
        </small>
    </div>

    <div class="form-group">
        <label for="coordinates">Location Coordinates</label>
        <input id="coordinates" pInputText type="text" formControlName="coordinates" placeholder="e.g., 40.7128, -74.0060"
            class="w-full" />
        <small class="error" *ngIf="locationForm.get('coordinates')?.invalid && locationForm.get('coordinates')?.touched">
            Coordinates are required
        </small>
    </div>

    <div class="form-group">
        <label for="timeZone">Time Zone</label>
        <p-select id="timeZone" [options]="timeZones" optionLabel="label" optionValue="value" 
            formControlName="timeZone" placeholder="Select time zone" class="w-full"></p-select>
        <small class="error" *ngIf="locationForm.get('timeZone')?.invalid && locationForm.get('timeZone')?.touched">
            Time zone is required
        </small>
    </div>
</form>

<div class="form-actions pt-2" dialogFooter>
    <button type="button" pButton label="Cancel" icon="pi pi-times" class="p-button-secondary"
        (click)="resetForm()"></button>
    <button type="submit" pButton label="Add Location" icon="pi pi-check" [disabled]="!locationForm.valid"
        (click)="onSubmit()"></button>
</div>
