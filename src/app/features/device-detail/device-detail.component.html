<main class="content p-0">
  <div class="grid grid-cols-3 gap-6 relative"  style="height: calc(100vh - 105px);">
    <!-- Device View - 2 columns -->
    <div class="col-span-2">
      <app-device-view></app-device-view>
    </div>

    <!-- Device Details - 1 column -->
    <div class="col-span-1 bg-sidebar border border-sidebar-border rounded-lg p-4 h-100 sticky">
      <p-dock styleClass="docker-outside" class="docker-outside" [model]="dockItems1" [position]="'left'" >
        <ng-template let-item>
            <i [class]="item.icon"></i>
        </ng-template>
    </p-dock>
      <!-- Basic Info -->
      <div class="mb-6 pb-6 border-b border-sidebar-border">
        <h3 class="text-sm font-semibold text-sidebar-foreground uppercase mb-3 opacity-75">Basic Information</h3>
        <div class="space-y-3">
          <div>
            <p class="text-xs text-sidebar-foreground opacity-60">Device Name</p>
            <p class="text-sidebar-foreground font-medium">Tower A-1</p>
          </div>
          <div>
            <p class="text-xs text-sidebar-foreground opacity-60">Device ID</p>
            <p class="text-sidebar-foreground font-medium font-mono text-sm">DEV-2024-00147</p>
          </div>
        </div>
      </div>

      <!-- Location & Network -->
      <div class="mb-6 pb-6 border-b border-sidebar-border">
        <h3 class="text-sm font-semibold text-sidebar-foreground uppercase mb-3 opacity-75">Location & Network</h3>
        <div class="space-y-3">
          <div>
            <p class="text-xs text-sidebar-foreground opacity-60">Location</p>
            <p class="text-sidebar-foreground font-medium">North Building</p>
          </div>
          <div>
            <p class="text-xs text-sidebar-foreground opacity-60">Firmware</p>
            <p class="text-sidebar-foreground font-medium">v2.3.1</p>
          </div>
        </div>
      </div>

         </div>
  </div>
</main>
