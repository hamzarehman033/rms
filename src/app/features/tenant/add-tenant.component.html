<form [formGroup]="tenantForm" class="form-section">
    <div class="form-group">
        <label for="name">Tenant Name</label>
        <input id="name" pInputText type="text" formControlName="name" placeholder="Enter tenant name"
            class="w-full" />
        <small class="error" *ngIf="tenantForm.get('name')?.invalid && tenantForm.get('name')?.touched">
            Name is required and must be at least 3 characters
        </small>
    </div>

    <div class="form-group">
        <label for="domain">Domain</label>
        <input id="domain" pInputText type="text" formControlName="domain" placeholder="e.g., my-tenant"
            class="w-full" />
        <small class="error" *ngIf="tenantForm.get('domain')?.invalid && tenantForm.get('domain')?.touched">
            Domain is required and must contain only lowercase letters, numbers, and hyphens
        </small>
    </div>

    <div class="form-group">
        <label for="email">Email</label>
        <input id="email" pInputText type="email" formControlName="email" placeholder="Enter email address"
            class="w-full" />
        <small class="error" *ngIf="tenantForm.get('email')?.invalid && tenantForm.get('email')?.touched">
            Valid email is required
        </small>
    </div>

    <div class="form-group">
        <label for="tenantType">Tenant Type</label>
        <p-dropdown id="tenantType" formControlName="tenantType" [options]="tenantTypes" optionLabel="label"
            optionValue="value" placeholder="Select tenant type" class="w-full"></p-dropdown>
        <small class="error" *ngIf="tenantForm.get('tenantType')?.invalid && tenantForm.get('tenantType')?.touched">
            Tenant type is required
        </small>
    </div>

    <div class="form-group">
        <label for="description">Description</label>
        <input id="description" pInputText type="text" formControlName="description" placeholder="Enter description (optional)"
            class="w-full" />
    </div>

    <div class="form-group">
        <label for="active">
            <p-inputSwitch formControlName="active"></p-inputSwitch>
            Active
        </label>
    </div>
</form>

<div class="form-actions" dialogFooter>
    <button type="button" pButton label="Cancel" icon="pi pi-times" class="p-button-secondary"
        (click)="resetForm()"></button>
    <button type="submit" pButton label="Add Tenant" icon="pi pi-check" [disabled]="!tenantForm.valid"
        (click)="onSubmit()"></button>
</div>
