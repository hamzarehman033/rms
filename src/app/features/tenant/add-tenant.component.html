<form [formGroup]="tenantForm" class="form-section">
    <div class="form-group">
        <label for="name">Tenant Name</label>
        <input id="name" pInputText type="text" formControlName="name" placeholder="Enter tenant name"
            class="w-full" />
        <small class="error" *ngIf="tenantForm.get('name')?.invalid && tenantForm.get('name')?.touched">
            Name is required and must be at least 3 characters
        </small>
    </div>

    <div class="form-group">
        <label for="code">Code</label>
        <input id="code" pInputText type="text" formControlName="code" placeholder="Enter tenant code"
            class="w-full" />
        <small class="error" *ngIf="tenantForm.get('code')?.invalid && tenantForm.get('code')?.touched">
            Code is required
        </small>
    </div>

    <div class="form-group">
        <label for="status">Status</label>
        <p-dropdown id="status" formControlName="status" [options]="statusOptions" optionLabel="label"
            optionValue="value" placeholder="Select status" class="w-full"></p-dropdown>
        <small class="error" *ngIf="tenantForm.get('status')?.invalid && tenantForm.get('status')?.touched">
            Status is required
        </small>
    </div>

    <div class="form-group">
        <label for="description">Description</label>
        <input id="description" pInputText type="text" formControlName="description" placeholder="Enter description (optional)"
            class="w-full" />
    </div>

</form>

<div class="form-actions" dialogFooter>
    <button type="button" pButton label="Cancel" icon="pi pi-times" class="p-button-secondary"
        (click)="resetForm()"></button>
    <button type="submit" pButton [label]="isEditMode ? 'Update Tenant' : 'Add Tenant'" icon="pi pi-check" [disabled]="!tenantForm.valid"
        (click)="onSubmit()"></button>
</div>
