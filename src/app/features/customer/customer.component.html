<main class="content">
  <div class="page-header">
    <div>
      <h1 class="mt-2 font-display text-2xl font-semibold tracking-tight md:text-3xl">Customer Management</h1>
      <p>Manage and monitor customer accounts.</p>
    </div>
  </div>

  <div class="grid cols-4">
    <div class="stat">
      <div class="row"><span class="label">Customers</span></div>
      <div><span class="value">{{ totalCustomers }}</span></div>
      <div class="hint">Total accounts</div>
    </div>
    <div class="stat">
      <div class="row"><span class="label">Active</span></div>
      <div><span class="value">{{ activeCustomers }}</span></div>
      <div class="hint">Active accounts</div>
    </div>
    <!-- <div class="stat">
      <div class="row"><span class="label">Revenue</span></div>
      <div><span class="value">$0</span></div>
      <div class="hint">monthly recurring</div>
    </div> -->
  </div>
  <div class="hstack justify-between flex-wrap gap-3">
    <div class="tabs">
      <button [ngClass]="{ 'active': selectedTab === 0 }" (click)="selectedTab = 0">All <span class="muted">{{ totalCustomers }}</span></button>
      <button [ngClass]="{ 'active': selectedTab === 1 }" (click)="selectedTab = 1">Active <span class="muted">{{ activeCustomers }}</span></button>
      <button [ngClass]="{ 'active': selectedTab === 2 }" (click)="selectedTab = 2">Inactive <span class="muted">{{ inactiveCustomers }}</span></button>
    </div>
    <div class="hstack">
      <div class="search"><i class="pi pi-search"></i><input placeholder="Search by name…" (input)="searchTerm = $any($event).target.value"></div>
      <button class="btn primary" (click)="openAddCustomerDialog()"><i class="pi pi-plus"></i><span>Add
          customer</span></button>
    </div>
  </div>
  <!-- Table -->
  <div class="card p-0">
    <p-table
      [value]="filteredCustomers"
      [loading]="isLoading"
      styleClass="p-datatable-sm"
      responsiveLayout="scroll"
    >
      <ng-template pTemplate="header">
        <tr>
          <th>Customer</th>
          <th>Email</th>
          <th>Status</th>
          <th>Plan</th>
          <th>Actions</th>
        </tr>
      </ng-template>
      <ng-template pTemplate="body" let-customer>
        <tr>
          <td>
            <div class="font-medium">{{ customer.name }}</div>
          </td>
          <td class="muted">{{ customer.email }}</td>
          <td>
            <span [ngClass]="[customer.status == 'Active' ? 'badge online' : 'badge warning']" *ngIf="customer.status">● {{customer.status}}</span>
          </td>
          <td>
            <span class="badge success" *ngIf="customer.plan === 'Premium'">Premium</span>
            <span class="badge primary" *ngIf="customer.plan === 'Standard'">Standard</span>
            <span class="badge info" *ngIf="customer.plan === 'Enterprise'">Enterprise</span>
          </td>
          <td>
            <div class="flex items-center gap-2">
              <button class="btn sm" (click)="openEditCustomerDialog(customer)" title="Edit customer" aria-label="Edit customer">
                <i class="pi pi-pencil"></i>
              </button>
              <button class="btn sm" (click)="deleteCustomer(customer)" title="Delete customer" aria-label="Delete customer">
                <i class="pi pi-trash"></i>
              </button>
            </div>
          </td>
        </tr>
      </ng-template>
      <ng-template pTemplate="emptymessage">
        <tr>
          <td colspan="5" class="text-center py-8 muted">No customers found</td>
        </tr>
      </ng-template>
    </p-table>
  </div>

</main>

<!-- Add Customer Dialog -->
<app-modal-dialog [(visible)]="displayAddCustomerDialog" [header]="dialogHeader"
  (onHide)="displayAddCustomerDialog = false">
  <app-add-customer [customerId]="selectedCustomerIdForEdit" (customerAdded)="onCustomerAdded($event)" (customerUpdated)="onCustomerUpdated($event)"></app-add-customer>
</app-modal-dialog>

<p-confirmDialog></p-confirmDialog>
