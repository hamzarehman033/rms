<form [formGroup]="customerForm" class="form-section">
    <div class="form-row">
        <div class="form-group half">
            <label for="name">Name</label>
            <input id="name" pInputText type="text" formControlName="name" placeholder="Enter Name"
                class="w-full" />
            <small class="error" *ngIf="customerForm.get('name')?.invalid && customerForm.get('name')?.touched">
                Name is required and must be at least 2 characters
            </small>
        </div>
    </div>

    <div class="form-group">
        <label for="email">Email</label>
        <input id="email" pInputText type="email" formControlName="email" placeholder="Enter email address"
            class="w-full" />
        <small class="error" *ngIf="customerForm.get('email')?.invalid && customerForm.get('email')?.touched">
            Valid email is required
        </small>
    </div>

    <div class="form-group">
        <label for="description">Description</label>
        <input id="description" pInputText type="text" formControlName="description" placeholder="Enter description (optional)"
            class="w-full" />
    </div>

    <div class="form-group" *ngIf="isEditMode">
        <label for="status" class="mb-2 block">Status</label>
        <div class="flex items-center gap-2">
            <p-inputSwitch inputId="status" formControlName="status"></p-inputSwitch>
        </div>
    </div>

            Valid phone number is required
        </small>

</form>

<div class="form-actions pt-2" dialogFooter>
    <button type="button" pButton label="Cancel" icon="pi pi-times" class="p-button-secondary"
        (click)="resetForm()" [disabled]="isLoading"></button>
    <button type="submit" pButton [label]="isLoading ? (isEditMode ? 'Updating...' : 'Adding...') : (isEditMode ? 'Update Customer' : 'Add Customer')" icon="pi pi-check" [disabled]="!customerForm.valid || isLoading"
        [loading]="isLoading" (click)="onSubmit()"></button>
</div>
