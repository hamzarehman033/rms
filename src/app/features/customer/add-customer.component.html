<form [formGroup]="customerForm" class="form-section">
    <div class="form-row">
        <div class="form-group half">
            <label for="firstName">First Name</label>
            <input id="firstName" pInputText type="text" formControlName="firstName" placeholder="Enter first name"
                class="w-full" />
            <small class="error" *ngIf="customerForm.get('firstName')?.invalid && customerForm.get('firstName')?.touched">
                First name is required and must be at least 2 characters
            </small>
        </div>

        <div class="form-group half">
            <label for="lastName">Last Name</label>
            <input id="lastName" pInputText type="text" formControlName="lastName" placeholder="Enter last name"
                class="w-full" />
            <small class="error" *ngIf="customerForm.get('lastName')?.invalid && customerForm.get('lastName')?.touched">
                Last name is required and must be at least 2 characters
            </small>
        </div>
    </div>

    <div class="form-group">
        <label for="email">Email</label>
        <input id="email" pInputText type="email" formControlName="email" placeholder="Enter email address"
            class="w-full" />
        <small class="error" *ngIf="customerForm.get('email')?.invalid && customerForm.get('email')?.touched">
            Valid email is required
        </small>
    </div>

    <div class="form-group">
        <label for="phone">Phone</label>
        <input id="phone" pInputText type="tel" formControlName="phone" placeholder="Enter phone number"
            class="w-full" />
        <small class="error" *ngIf="customerForm.get('phone')?.invalid && customerForm.get('phone')?.touched">
            Valid phone number is required
        </small>
    </div>

    <div class="form-group">
        <label for="customerType">Customer Type</label>
        <p-dropdown id="customerType" formControlName="customerType" [options]="customerTypes" optionLabel="label"
            optionValue="value" placeholder="Select customer type" class="w-full"></p-dropdown>
        <small class="error" *ngIf="customerForm.get('customerType')?.invalid && customerForm.get('customerType')?.touched">
            Customer type is required
        </small>
    </div>

    <div class="form-group">
        <label for="address">Address</label>
        <input id="address" pInputText type="text" formControlName="address" placeholder="Enter address (optional)"
            class="w-full" />
    </div>

    <div class="form-row">
        <div class="form-group half">
            <label for="city">City</label>
            <input id="city" pInputText type="text" formControlName="city" placeholder="Enter city (optional)"
                class="w-full" />
        </div>

        <div class="form-group half">
            <label for="country">Country</label>
            <input id="country" pInputText type="text" formControlName="country" placeholder="Enter country (optional)"
                class="w-full" />
        </div>
    </div>
</form>

<div class="form-actions" dialogFooter>
    <button type="button" pButton label="Cancel" icon="pi pi-times" class="p-button-secondary"
        (click)="resetForm()"></button>
    <button type="submit" pButton label="Add Customer" icon="pi pi-check" [disabled]="!customerForm.valid"
        (click)="onSubmit()"></button>
</div>
