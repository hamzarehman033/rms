<form [formGroup]="dataSourceForm" class="form-section">
    <div class="form-group">
        <label for="name">Data Source Name</label>
        <input id="name" pInputText type="text" formControlName="name" placeholder="Enter data source name"
            class="w-full" />
        <small class="error" *ngIf="dataSourceForm.get('name')?.invalid && dataSourceForm.get('name')?.touched">
            Name is required and must be at least 3 characters
        </small>
    </div>

    <div class="form-group">
        <label for="sourceType">Source Type</label>
        <p-dropdown id="sourceType" formControlName="sourceType" [options]="sourceTypes" optionLabel="label"
            optionValue="value" placeholder="Select source type" class="w-full"></p-dropdown>
        <small class="error" *ngIf="dataSourceForm.get('sourceType')?.invalid && dataSourceForm.get('sourceType')?.touched">
            Source type is required
        </small>
    </div>

    <div class="form-group">
        <label for="endpoint">Endpoint</label>
        <input id="endpoint" pInputText type="text" formControlName="endpoint" placeholder="e.g., https://api.example.com"
            class="w-full" />
        <small class="error" *ngIf="dataSourceForm.get('endpoint')?.invalid && dataSourceForm.get('endpoint')?.touched">
            Endpoint is required
        </small>
    </div>

    <div class="form-group">
        <label for="connectionString">Connection String</label>
        <input id="connectionString" pInputText type="text" formControlName="connectionString" 
            placeholder="Connection details (optional)" class="w-full" />
    </div>

    <div class="form-group">
        <label for="refreshRate">Refresh Rate (seconds)</label>
        <p-inputNumber id="refreshRate" formControlName="refreshRate" [min]="5" [max]="3600" placeholder="60"
            class="w-full"></p-inputNumber>
        <small class="error" *ngIf="dataSourceForm.get('refreshRate')?.invalid && dataSourceForm.get('refreshRate')?.touched">
            Refresh rate must be at least 5 seconds
        </small>
    </div>
</form>

<div class="form-actions" dialogFooter>
    <button type="button" pButton label="Cancel" icon="pi pi-times" class="p-button-secondary"
        (click)="resetForm()"></button>
    <button type="submit" pButton label="Add Source" icon="pi pi-check" [disabled]="!dataSourceForm.valid"
        (click)="onSubmit()"></button>
</div>
