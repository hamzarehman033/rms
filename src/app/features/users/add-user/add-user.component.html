<form [formGroup]="userForm" class="form-section">
    <div class="form-group">
        <label for="userName">Username</label>
        <input id="userName" pInputText type="text" formControlName="userName" placeholder="Enter user name"
            class="w-full" />
        <small class="error" *ngIf="userForm.get('userName')?.invalid && userForm.get('userName')?.touched">
            Username must be at least 2 characters and contain only letters or digits
        </small>
    </div>
    <div class="form-group" *ngIf="!isEditMode">
        <label for="password">Password</label>
        <input id="password" pInputText type="password" formControlName="password" placeholder="Enter password"
            class="w-full" />
        <small class="error" *ngIf="userForm.get('password')?.invalid && userForm.get('password')?.touched">
            Password is required and must be at least 6 characters
        </small>
    </div>
    <div class="form-group">
        <label for="phoneNumber">Phone Number</label>
        <input id="phoneNumber" pInputText type="text" formControlName="phoneNumber" placeholder="Enter phone number"
            class="w-full" />
        <small class="error" *ngIf="userForm.get('phoneNumber')?.invalid && userForm.get('phoneNumber')?.touched">
            Phone number is required
        </small>
    </div>

    <div class="form-group">
        <label for="email">Email</label>
        <input id="email" pInputText type="email" formControlName="email" placeholder="Enter email address"
            class="w-full" />
        <small class="error" *ngIf="userForm.get('email')?.invalid && userForm.get('email')?.touched">
            Valid email is required
        </small>
    </div>

    <div class="form-group">
        <label for="role">Role</label>
        <p-dropdown id="role" formControlName="role" [options]="roles" optionLabel="label" optionValue="value"
            placeholder="Select user role" class="w-full"></p-dropdown>
        <small class="error" *ngIf="userForm.get('role')?.invalid && userForm.get('role')?.touched">
            Role is required
        </small>
    </div>

    <div class="form-group" *ngIf="showCustomerSelector">
        <label for="assignedCustomerIds">Customers</label>
        <p-multiSelect id="assignedCustomerIds" formControlName="assignedCustomerIds" [options]="customerOptions" optionLabel="name"
            optionValue="id" placeholder="Select customers" class="w-full" display="chip"></p-multiSelect>
    </div>

    <div class="form-group">
        <label style="display:block;margin-bottom:12px;font-weight:500">Module Permissions</label>
        <div style="display:flex;flex-direction:column;">
            <div *ngFor="let module of modules"
                style="display:flex;align-items:center;gap:12px;padding:8px;border:1px solid var(--surface-border);border-radius:4px">
                <div style="flex:1">
                    <div style="display:flex;align-items:center;gap:6px;font-weight:500">
                        <i [class]="module.icon"></i>
                        {{ module.label }}
                    </div>
                </div>
                <div style="display:flex;gap:16px;align-items:center">
                    <!-- <div style="display:flex;align-items:center;gap:6px">
                        <input type="checkbox" [name]="module.value + '-view'" [id]="module.value + '-view'" />
                        <label [for]="module.value + '-view'" style="margin:0;cursor:pointer;font-size:13px">
                            View
                        </label>
                    </div> -->
                    <div style="display:flex;align-items:center;gap:6px">
                        <input
                            type="checkbox"
                            [name]="module.value + '-edit'"
                            [id]="module.value + '-edit'"
                            [checked]="module.selected"
                            (change)="onModuleChange(module)"/>
                        <label [for]="module.value + '-edit'" style="margin:0;cursor:pointer;font-size:13px">
                            Active
                        </label>
                    </div>
                </div>
            </div>
        </div>
    </div>
</form>

<div class="form-actions mt-2" dialogFooter>
    <button type="button" pButton label="Cancel" icon="pi pi-times" class="p-button-secondary" (click)="resetForm()"
        [disabled]="isLoading"></button>
    <button type="submit" pButton
        [label]="isLoading ? (isEditMode ? 'Updating...' : 'Adding...') : (isEditMode ? 'Update User' : 'Add User')"
        icon="pi pi-check" [disabled]="!userForm.valid || isLoading" [loading]="isLoading"
        (click)="onSubmit()"></button>
</div>
