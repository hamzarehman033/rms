<main class="content">
      <div class="page-header">
        <div><h1>Settings</h1><p>Manage your workspace branding and white-label appearance.</p></div>
        
      </div>

      <section class="card">
        <div class="hstack"><div class="tile-icon"><i class="pi pi-th-large"></i></div>
          <div><div class="muted" style="font-size:11px;text-transform:uppercase;letter-spacing:.1em">Workspace</div>
          <div style="font-weight:500">demo&#64;pulse.io</div></div>
        </div>
      </section>

      <section class="card">
        <div class="hstack" style="justify-content:space-between;margin-bottom:18px">
          <div><h3>Branding</h3><div class="sub">Customize the app name and logo shown across your console.</div></div>
          <div class="brand-preview"><i class="pi pi-image"></i></div>
        </div>

        <div class="grid cols-2">
          <div class="field">
            <label>Application name</label>
            <input class="input" value="PulseGrid" placeholder="PulseGrid" maxlength="40">
            <div class="muted" style="font-size:11px">Replaces "PulseGrid" in the sidebar, top bar, and landing page.</div>
          </div>

          <div class="field">
            <label>Logo</label>
            <div class="upload-row">
              <div class="upload-thumb">none</div>
              <button class="btn sm"><i class="pi pi-upload"></i><span>Upload</span></button>
            </div>
            <div class="muted" style="font-size:11px">PNG or SVG, square, under 512KB.</div>
          </div>
        </div>

        <div class="hstack" style="justify-content:flex-end;border-top:1px solid var(--border);padding-top:16px;margin-top:20px;gap:8px">
          <button class="btn ghost sm"><i class="pi pi-refresh"></i><span>Reset to defaults</span></button>
          <button class="btn primary sm"><i class="pi pi-save"></i><span>Save changes</span></button>
        </div>
      </section>
</main>
