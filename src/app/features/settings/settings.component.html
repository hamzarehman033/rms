<main class="content">
      <div class="page-header">
        <div><h1>Settings</h1><p>Manage your workspace branding and white-label appearance.</p></div>
        
      </div>

      <section class="card">
        <div class="hstack"><div class="tile-icon"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 21V9h6v12"/></svg></div>
          <div><div class="muted" style="font-size:11px;text-transform:uppercase;letter-spacing:.1em">Workspace</div>
          <div style="font-weight:500">demo&#64;pulse.io</div></div>
        </div>
      </section>

      <section class="card">
        <div class="hstack" style="justify-content:space-between;margin-bottom:18px">
          <div><h3>Branding</h3><div class="sub">Customize the app name and logo shown across your console.</div></div>
          <div class="brand-preview"><svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg></div>
        </div>

        <div class="grid cols-2">
          <div class="field">
            <label>Application name</label>
            <input class="input" value="PulseGrid" placeholder="PulseGrid" maxlength="40">
            <div class="muted" style="font-size:11px">Replaces "PulseGrid" in the sidebar, top bar, and landing page.</div>
          </div>

          <div class="field">
            <label>Logo</label>
            <div class="upload-row">
              <div class="upload-thumb">none</div>
              <button class="btn sm"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg><span>Upload</span></button>
            </div>
            <div class="muted" style="font-size:11px">PNG or SVG, square, under 512KB.</div>
          </div>
        </div>

        <div class="hstack" style="justify-content:flex-end;border-top:1px solid var(--border);padding-top:16px;margin-top:20px;gap:8px">
          <button class="btn ghost sm"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg><span>Reset to defaults</span></button>
          <button class="btn primary sm"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg><span>Save changes</span></button>
        </div>
      </section>
</main>
