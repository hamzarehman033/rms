<main class="content">
  <div class="page-header">
    <div>
      <h1>Sites</h1>
      <p>Manage and monitor your full portfolio of connected sites.</p>
    </div>

  </div>
  <div class="hstack justify-between flex-wrap gap-3">
    <div class="tabs">
      <button [ngClass]="{ 'active': selectedTab === 0 }" (click)="selectedTab = 0">All <span class="muted">150</span></button>
      <button [ngClass]="{ 'active': selectedTab === 1 }" (click)="selectedTab = 1">Online <span class="muted">142</span></button>
      <button [ngClass]="{ 'active': selectedTab === 2 }" (click)="selectedTab = 2">Warning <span class="muted">5</span></button>
      <button [ngClass]="{ 'active': selectedTab === 3 }" (click)="selectedTab = 3">Offline <span class="muted">3</span></button>
    </div>
    <div class="hstack">
      <div class="search"><i class="pi pi-search"></i><input placeholder="Search by ID or name…"></div>
      <button class="btn primary" (click)="openAddSiteDialog()"><i class="pi pi-plus"></i><span>Add
          site</span></button>
    </div>
  </div>
  <div class="card p-0">
    <table class="table">
      <thead>
        <tr>
          <th>Site</th>
          <th>Status</th>
          <th>Type</th>
          <th>Location</th>
          <th>Battery</th>
          <th>Last seen</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let site of sites">
          <td>
            <a routerLink="/site-dashboard" [queryParams]="{id: site.id}">
              <div class="font-medium text-blue-600">{{ site.name }}</div>
              <div class="muted mono text-xs">{{ site.id }}</div>
            </a>
          </td>
          <td><span [ngClass]="'badge ' + site.status">● {{ site.status | titlecase }}</span></td>
          <td>{{ site.type }}</td>
          <td>{{ site.location }}</td>
          <td class="mono">{{ site.battery }}</td>
          <td class="muted">{{ site.lastSeen }}</td>
          <td>
            <div class="flex gap-2">
              <button (click)="navigateToSiteDashboard(site.id)" title="Site Dashboard" class="text-blue-500 hover:text-white hover:bg-blue-600 transition-colors p-2 rounded">
                <i class="pi pi-chart-bar text-base"></i>
              </button>
              <button (click)="navigateToSiteDetail(site.id)" title="Site Details" class="text-blue-500 hover:text-white hover:bg-blue-600 transition-colors p-2 rounded">
                <i class="pi pi-tablet text-base"></i>
              </button>
              <button (click)="openSiteConfiguration(site)" title="Configure Site" class="text-gray-500 hover:text-white hover:bg-gray-600 transition-colors p-2 rounded">
                <i class="pi pi-cog text-base"></i>
              </button>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</main>

<!-- Add Site Dialog -->
<app-modal-dialog [(visible)]="displayAddSiteDialog" header="Add New Site">
  <app-add-site (siteAdded)="onSiteAdded($event)"></app-add-site>
</app-modal-dialog>

<!-- Site Configuration Dialog -->
<app-modal-dialog [(visible)]="displayConfigDialog" header="Configure Site: {{ selectedSiteForConfig?.name }}">
  <app-site-configuration [site]="selectedSiteForConfig" (siteConfigured)="onSiteConfigured()"></app-site-configuration>
</app-modal-dialog>
