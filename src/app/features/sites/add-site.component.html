<form [formGroup]="siteForm" (ngSubmit)="onSubmit()" class="form-section">
    <div class="form-group">
        <label for="siteName">Site Name</label>
        <input id="siteName" pInputText type="text" formControlName="siteName" placeholder="Enter site name"
            class="w-full" />
        <small class="error" *ngIf="siteForm.get('siteName')?.invalid && siteForm.get('siteName')?.touched">
            Site name is required and must be at least 3 characters
        </small>
    </div>

    <div class="form-group">
        <label for="siteId">Site ID</label>
        <input id="siteId" pInputText type="text" formControlName="siteId" placeholder="e.g., ST-001"
            class="w-full" />
        <small class="error" *ngIf="siteForm.get('siteId')?.invalid && siteForm.get('siteId')?.touched">
            Site ID is required
        </small>
    </div>

    <div class="form-group">
        <label for="subscriptionType">Subscription Type</label>
        <p-dropdown id="subscriptionType" formControlName="subscriptionType" [options]="subscriptionTypes" optionLabel="label"
            optionValue="value" placeholder="Select subscription type" class="w-full"></p-dropdown>
        <small class="error" *ngIf="siteForm.get('subscriptionType')?.invalid && siteForm.get('subscriptionType')?.touched">
            Subscription type is required
        </small>
    </div>

    <div class="form-group">
        <label for="location">Location</label>
        <p-dropdown id="location" formControlName="location" [options]="locations" optionLabel="label"
            optionValue="value" placeholder="Select location" class="w-full"></p-dropdown>
        <small class="error" *ngIf="siteForm.get('location')?.invalid && siteForm.get('location')?.touched">
            Location is required
        </small>
    </div>

    <div class="form-group">
        <label for="installationDate">Installation Date</label>
        <input id="installationDate" pInputText type="date" formControlName="installationDate" 
            class="w-full" />
        <small class="error" *ngIf="siteForm.get('installationDate')?.invalid && siteForm.get('installationDate')?.touched">
            Installation date is required
        </small>
    </div>

    <div class="form-actions">
        <button type="button" pButton label="Cancel" icon="pi pi-times" class="p-button-secondary"
            (click)="resetForm()"></button>
        <button type="submit" class="btn primary" pButton label="Add Site" icon="pi pi-check" [disabled]="!siteForm.valid"></button>
    </div>
</form>
