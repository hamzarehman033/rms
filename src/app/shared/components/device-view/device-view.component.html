<!-- Popover Container -->
<div class="fixed bg-white rounded-xl shadow-2xl border border-gray-200 pointer-events-auto"
    style="width: 360px; max-height: 600px; z-index: 1000;" [style.display]="showPopover ? 'block' : 'none'"
    [style.left.px]="popoverX" [style.top.px]="popoverY">

    <!-- Popover Arrow/Tail -->
    <div class="absolute w-3 h-3 bg-white border border-gray-200 transform -rotate-45"
        style="top: -6px; left: 20px; box-shadow: -1px -1px 1px rgba(0,0,0,0.05);"></div>

    <!-- Close Button -->
    <button (click)="closePopover()" class="absolute top-3 right-3 text-gray-400 hover:text-gray-600 transition-colors">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
        </svg>
    </button>

    <!-- Header -->
    <div class="px-5 pt-5 pb-4 border-b border-gray-100">
        <h3 class="text-lg font-bold text-gray-900">{{ selectedDevice?.name }}</h3>
        <p class="text-xs text-gray-500 mt-1">{{ selectedDevice?.type }}</p>
    </div>

    <!-- Content -->
    <div class="px-5 py-4 space-y-4">

        <!-- Status Badge -->
        <div class="flex items-center gap-2">
            <span
                class="inline-flex items-center px-3 py-1 rounded-full text-xs font-semibold bg-green-100 text-green-800">
                <span class="w-2 h-2 bg-green-600 rounded-full mr-1.5"></span>
                {{ selectedDevice?.status | uppercase }}
            </span>
            <span class="text-xs text-gray-500">Signal: {{ selectedDevice?.signal }}%</span>
        </div>

        <!-- Metrics Grid -->
        <div class="grid grid-cols-2 gap-3">
            <div class="bg-gray-50 rounded-lg p-3">
                <p class="text-xs text-gray-500 mb-1">Temperature</p>
                <p class="text-lg font-bold text-blue-600">{{ selectedDevice?.temperature }}°C</p>
            </div>
            <div class="bg-gray-50 rounded-lg p-3">
                <p class="text-xs text-gray-500 mb-1">Power</p>
                <p class="text-lg font-bold text-yellow-600">{{ selectedDevice?.power }}W</p>
            </div>
        </div>

    </div>

</div>
