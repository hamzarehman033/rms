<aside class="sidebar" data-state="expanded" aria-label="Primary">
  <!-- Header / brand -->
  <div class="sidebar-header">
    <div class="brand">
      <div class="brand-mark" aria-hidden="true">
        <!-- Activity icon -->
        <i class="pi pi-chart-line"></i>
      </div>
      <div class="brand-text">
        <div class="brand-name">PulseGrid</div>
        <div class="brand-sub">IoT Console</div>
      </div>
    </div>
  </div>

  <!-- Content / scrollable -->
  <div class="sidebar-content">

    <section class="group">
      <div class="group-label">Monitor</div>
      <ul class="menu" role="list">
        <li><a class="menu-btn" [routerLink]="'/dashboard'" routerLinkActive="is-active" [routerLinkActiveOptions]="{exact: true}" aria-current="page">
            <i class="pi pi-home"></i>
            <span>Overview</span>
          </a></li>
        <li><a class="menu-btn" [routerLink]="'/devices'" routerLinkActive="is-active" [routerLinkActiveOptions]="{exact: true}">
            <i class="pi pi-server"></i>
            <span>Devices</span>
          </a></li>
        <li><a class="menu-btn" [routerLink]="'/telemetry'" routerLinkActive="is-active" [routerLinkActiveOptions]="{exact: true}">
            <i class="pi pi-chart-line"></i>
            <span>Telemetry</span>
          </a></li>
        <li><a class="menu-btn" [routerLink]="'/alarm'" routerLinkActive="is-active" [routerLinkActiveOptions]="{exact: true}">
            <i class="pi pi-bell"></i>
            <span>Alarms</span>
            <!-- <span class="badge">3</span> -->
          </a></li>
        <li><a class="menu-btn" [routerLink]="'/reports'" routerLinkActive="is-active" [routerLinkActiveOptions]="{exact: true}">
            <i class="pi pi-file"></i>
            <span>Reports</span>
          </a></li>
        <li><a class="menu-btn" [routerLink]="'/ai-analytics'" routerLinkActive="is-active" [routerLinkActiveOptions]="{exact: true}">
            <i class="pi pi-video"></i>
            <span>AI Analytics</span>
          </a></li>
      </ul>
    </section>

    <section class="group">
      <div class="group-label">Manage</div>
      <ul class="menu" role="list">
        <li><a class="menu-btn" [routerLink]="'/locations'" routerLinkActive="is-active" [routerLinkActiveOptions]="{exact: true}">
            <i class="pi pi-map-marker"></i>
            <span>Locations</span>
          </a></li>
        <li><a class="menu-btn" [routerLink]="'/rules'" routerLinkActive="is-active" [routerLinkActiveOptions]="{exact: true}">
            <i class="pi pi-clock"></i>
            <span>Rule Engine</span>
          </a></li>
        <li><a class="menu-btn" [routerLink]="'/data-sources'" routerLinkActive="is-active" [routerLinkActiveOptions]="{exact: true}">
            <i class="pi pi-database"></i>
            <span>Data Sources</span>
          </a></li>
      </ul>
    </section>

    <section class="group">
      <div class="group-label">Platform</div>
      <ul class="menu" role="list">
        <li><a class="menu-btn" [routerLink]="'/tenant'" routerLinkActive="is-active" [routerLinkActiveOptions]="{exact: true}">
            <i class="pi pi-building"></i>
            <span>Tenants</span>
          </a></li>
        <li><a class="menu-btn" [routerLink]="'/customer'" routerLinkActive="is-active" [routerLinkActiveOptions]="{exact: true}">
            <i class="pi pi-user"></i>
            <span>Customers</span>
          </a></li>
        <li><a class="menu-btn" [routerLink]="'/users'" routerLinkActive="is-active" [routerLinkActiveOptions]="{exact: true}">
            <i class="pi pi-users"></i>
            <span>Users</span>
          </a></li>
      </ul>
    </section>
  </div>

  <!-- Footer -->
  <div class="sidebar-footer">
    <ul class="menu" role="list">
      <li><a class="menu-btn" [routerLink]="'/settings'" routerLinkActive="is-active" [routerLinkActiveOptions]="{exact: true}">
          <i class="pi pi-cog"></i>
          <span>Settings</span>
        </a></li>
    </ul>
  </div>
</aside>
