<header class="topbar">
  <div class="status"><span class="pulse-dot"></span><span class="mono">All systems operational</span></div>
  <p-dropdown 
    [(ngModel)]="currentTenant" 
    [options]="tenants" 
    optionLabel="label" 
    optionValue="value"
    class="tenant-switcher">
  </p-dropdown>
  <div class="right">
    <div class="search"><input placeholder="Search devices, alerts…" /></div>
    <!-- <button class="theme-toggle" type="button" (click)="onThemeToggle()" aria-label="Toggle theme">
      <i class="icon-moon pi pi-moon"></i>
      <i class="icon-sun pi pi-sun"></i>
    </button> -->
    <button class="icon-btn"><i class="pi pi-bell"></i><span class="dot"></span></button>
    <button class="avatar" (click)="onAvatarClick($event)" aria-label="User menu">A</button>
    <p-menu #avatarMenu [model]="avatarMenuItems" [popup]="true" [appendTo]="'body'"></p-menu>
  </div>
</header>
